<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光文社 - 数字档案系统 | 《罪恶之花》绝密扫描件</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Liu+Jian+Mao+Cao&family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@300;700&family=Roboto:wght@300;500&display=swap');

        :root {
            --grid-size: 45px;
            --paper-color: #e2d7c0; /* 略微更深、更压抑的陈旧感 */
            --line-color: rgba(140, 110, 80, 0.3);
            --ui-bg: #0d0d0d;
            --ui-panel: #1a1a1a;
            --ui-text-main: #e0e0e0;
            --ui-text-muted: #666666;
            --ui-accent: #8e1b1b; /* 罪恶之花的暗红色 */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--ui-bg);
            display: flex;
            flex-direction: column;
            font-family: 'Roboto', 'Noto Serif SC', sans-serif;
            overflow: hidden; /* 禁止滚动 */
        }

        /* -------------------------------------
           光文社数字档案 UI (外框)
           ------------------------------------- */
        
        .archive-header {
            height: 60px;
            background-color: var(--ui-panel);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid #2a2a2a;
            z-index: 100;
        }

        .archive-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .archive-logo {
            font-family: 'Noto Serif SC', serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--ui-text-main);
            letter-spacing: 3px;
        }

        .archive-tag {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            background-color: var(--ui-accent);
            padding: 2px 10px;
            border-radius: 1px;
        }

        .archive-meta {
            font-size: 12px;
            color: var(--ui-text-muted);
            text-align: right;
        }

        .archive-meta span {
            color: var(--ui-text-main);
            margin-left: 6px;
        }

        /* 主体展示区 */
        .archive-viewer {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #222222 0%, #0d0d0d 100%);
        }

        .viewer-controls {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px 30px;
            display: flex;
            gap: 25px;
            color: #888;
            font-size: 13px;
            backdrop-filter: blur(8px);
            z-index: 100;
            pointer-events: none;
        }
        
        .control-item.active {
            color: #e0e0e0;
            border-left: 2px solid var(--ui-accent);
            padding-left: 10px;
        }

        /* -------------------------------------
           核心：手稿扫描件
           ------------------------------------- */
        .manuscript-paper {
            width: 85vw;
            max-width: 900px;
            height: calc(var(--grid-size) * 14); 
            background-color: var(--paper-color);
            background-image: 
                linear-gradient(var(--line-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--line-color) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            background-position: center 30px; 
            box-shadow: 0 30px 90px rgba(0,0,0,0.9), inset 0 0 120px rgba(80, 60, 40, 0.2);
            position: relative;
            padding: 30px 70px 0 70px;
            box-sizing: border-box;
            overflow: hidden; 
            color: #1a1a1a;
            line-height: var(--grid-size);
            font-size: 26px; 
            font-family: 'FZShouJinShu-S10S', 'FZShouJinShu', 'Liu Jian Mao Cao', cursive;
        }

        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 140px;
            font-family: 'Noto Serif SC', serif;
            font-weight: 700;
            color: rgba(142, 27, 27, 0.04);
            pointer-events: none;
            letter-spacing: 60px;
            z-index: 0;
            user-select: none;
        }

        .content {
            position: relative;
            z-index: 1;
            letter-spacing: 4px;
        }

        .title {
            text-align: center;
            font-size: 40px;
            margin: 0;
            height: var(--grid-size);
            letter-spacing: 20px;
            font-weight: bold;
        }

        p {
            margin: 0;
            margin-bottom: var(--grid-size);
            text-indent: 2em;
        }

        .scratch-container {
            display: inline-block;
            position: relative;
            vertical-align: top;
            line-height: normal;
        }

        .real-text {
            color: #111;
            padding: 0 8px;
            white-space: nowrap;
        }

        .scratch-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path d="M4 22L20 6L18 4L2 20Z" fill="%23f0f0f0" stroke="%23000" stroke-width="1.5"/><path d="M12 14l4 4" stroke="%23333" stroke-width="1"/></svg>') 4 20, auto;
        }

        .signature-block {
            margin-top: calc(var(--grid-size) * 1.5);
            text-align: right;
            padding-right: 40px;
        }

    </style>
</head>
<body>

    <header class="archive-header">
        <div class="archive-brand">
            <div class="archive-logo">KOBUNSHA 光文社</div>
            <div class="archive-tag">Top Secret Archive</div>
        </div>
        <div class="archive-meta">
            <div>文献编号: <span>#KB-MS-2008-108</span></div>
            <div>文档状态: <span>《罪恶之花》绝密修订件 / 电子修正带覆盖</span></div>
        </div>
    </header>

    <main class="archive-viewer">
        
        <div class="manuscript-paper">
            <div class="watermark">光文社</div>
            
            <div class="content">
                <div class="title">罪恶之花</div>
                <p>引言</p>
                <p>那朵花开在最污秽的角落里，根部吸食着名为痛苦的养分。它红得异常，像极了
                    <span class="scratch-container" data-fake="黄昏时分的晚霞" data-real="案发现场的喷溅血迹">
                        <span class="real-text">案发现场的喷溅血迹</span>
                    </span>。
                </p>
                <p>世人皆歌颂其艳丽，却无人嗅到那股令人作呕的腐臭。我站在阴影中观望，深知
                    <span class="scratch-container" data-fake="正义终将绽放" data-real="罪恶已根深蒂固">
                        <span class="real-text">罪恶已根深蒂固</span>
                    </span>。
                </p>
                <p>美丽是脆弱的谎言，而
                    <span class="scratch-container" data-fake="真实即是永恒" data-real="我即是那朵花">
                        <span class="real-text">我即是那朵花</span>
                    </span>。
                </p>
    
                <div class="signature-block">
                    <span class="scratch-container" data-fake="黑川龙" data-real="伊藤健司">
                        <span class="real-text" style="font-size: 38px;">伊藤健司</span>
                    </span>
                </div>
            </div>
        </div>


    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const containers = document.querySelectorAll('.scratch-container');

            containers.forEach(container => {
                const fakeText = container.getAttribute('data-fake');
                const realTextSpan = container.querySelector('.real-text');
                
                setTimeout(() => {
                    const rect = realTextSpan.getBoundingClientRect();
                    const paddingX = 25; 
                    const paddingY = 15; 
                    
                    const canvas = document.createElement('canvas');
                    canvas.className = 'scratch-canvas';
                    canvas.width = rect.width + paddingX * 2;
                    canvas.height = rect.height + paddingY * 2;
                    
                    container.appendChild(canvas);
                    const ctx = canvas.getContext('2d');

                    // 绘制厚重的白色修正带效果
                    ctx.fillStyle = '#ffffff'; 
                    ctx.beginPath();
                    // 增加一点粗糙的边缘感，不像现代修正带那么平整
                    ctx.roundRect(5, 5, canvas.width - 10, canvas.height - 10, 4);
                    ctx.fill();

                    // 绘制上层的伪造文字（黑川龙：豪迈狂草）
                    ctx.fillStyle = '#111';
                    ctx.font = 'bold 30px "Zhi Mang Xing", cursive'; 
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.save();
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.rotate(-0.04); 
                    ctx.fillText(fakeText, 0, 0);
                    ctx.restore();

                    // 刮开交互逻辑
                    let isDrawing = false;

                    function getPos(canvas, e) {
                        const rect = canvas.getBoundingClientRect();
                        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                        return { x: clientX - rect.left, y: clientY - rect.top };
                    }

                    function scratch(e) {
                        if (!isDrawing) return;
                        e.preventDefault(); 
                        const pos = getPos(canvas, e);
                        ctx.globalCompositeOperation = 'destination-out';
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, 15, 0, Math.PI * 2); 
                        ctx.fill();
                    }

                    canvas.addEventListener('mousedown', (e) => { isDrawing = true; scratch(e); });
                    canvas.addEventListener('mousemove', scratch);
                    window.addEventListener('mouseup', () => { isDrawing = false; });
                    canvas.addEventListener('mouseleave', () => { isDrawing = false; });
                    canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); }, {passive: false});
                    canvas.addEventListener('touchmove', scratch, {passive: false});
                }, 600); 
            });
        });
    </script>
</body>
</html>
