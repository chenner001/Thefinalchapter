<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮件 - 黑川雪</title>
    <style>
        /* ================= 基础重置 ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #d1d5db; /* 模拟 Mac 桌面背景色（灰色壁纸） */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* ================= Mac 窗口容器 ================= */
        .mac-window {
            width: 1000px;
            height: 650px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 0 1px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ================= 顶栏 (红黄绿按钮) ================= */
        .title-bar {
            height: 52px;
            background: #f6f6f6;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            padding: 0 15px;
            -webkit-app-region: drag;
        }
        .mac-btns {
            display: flex;
            gap: 8px;
        }
        .btn {
            width: 12px; height: 12px;
            border-radius: 50%;
        }
        .close { background-color: #ff5f56; border: 1px solid #e0443e; }
        .minimize { background-color: #ffbd2e; border: 1px solid #dea123; }
        .maximize { background-color: #27c93f; border: 1px solid #1aab29; }

        .toolbar-icons {
            margin-left: 30px;
            color: #666;
            font-size: 18px;
            display: flex;
            gap: 20px;
        }

        /* ================= 邮件主体 三栏布局 ================= */
        .mail-body {
            display: flex;
            flex: 1;
            height: calc(100% - 52px);
        }

        /* 1. 左侧导航栏 (Mailboxes) */
        .sidebar {
            width: 200px;
            background-color: #f4f5f5;
            border-right: 1px solid #e5e5e5;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
        }
        .sidebar-title {
            font-size: 11px;
            color: #999;
            font-weight: bold;
            padding: 5px 15px;
            margin-bottom: 5px;
        }
        .nav-item {
            padding: 8px 15px 8px 35px;
            font-size: 13px;
            color: #333;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        .nav-item:hover { background-color: #ebebeb; }
        .nav-item.active { background-color: #dcdfe3; color: #000; font-weight: 500; }
        
        /* 模拟图标 */
        .nav-item::before {
            content: '✉';
            position: absolute;
            left: 15px;
            font-size: 14px;
            color: #666;
        }
        .nav-item[data-target="sent"]::before { content: '➤'; font-size: 12px; }
        
        .badge {
            background-color: #007aff;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* 2. 中间邮件列表 */
        .list-pane {
            width: 300px;
            background-color: #ffffff;
            border-right: 1px solid #e5e5e5;
            overflow-y: auto;
        }
        .list-header {
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #e5e5e5;
            color: #000;
        }
        .mail-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .mail-item.active {
            background-color: #007aff;
            color: #fff;
        }
        .mail-item.active * { color: #fff !important; }
        
        .mail-sender { font-weight: 600; font-size: 14px; margin-bottom: 4px; color: #000;}
        .mail-subject { font-weight: 600; font-size: 13px; margin-bottom: 4px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .mail-preview { font-size: 12px; color: #888; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        .mail-time { font-size: 11px; color: #888; float: right; font-weight: normal;}

        /* 3. 右侧邮件详情 */
        .detail-pane {
            flex: 1;
            background-color: #ffffff;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }
        
        .detail-header {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        
        .detail-subject {
            font-size: 22px;
            font-weight: bold;
            color: #000;
            margin-bottom: 15px;
        }
        
        .detail-info {
            display: flex;
            align-items: center;
        }
        
        .avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            display: flex; justify-content: center; align-items: center;
            color: #fff; font-weight: bold; font-size: 18px;
            margin-right: 15px;
        }
        .avatar.gray { background: #dcdcdc; color: #666;}
        
        .sender-line { font-size: 14px; font-weight: 600; color: #000; margin-bottom: 3px;}
        .email-address { font-weight: normal; color: #888; font-size: 12px; }
        .to-line { font-size: 12px; color: #888; }
        .detail-date { position: absolute; right: 30px; top: 35px; font-size: 12px; color: #999; }

        .detail-body {
            font-size: 14px;
            color: #333;
            line-height: 1.8;
            user-select: text;
        }
        .detail-body p { margin-bottom: 15px; }
        
        /* 核心线索提示加粗 */
        .clue-text { font-weight: bold; color: #000; background: rgba(255, 235, 59, 0.3); padding: 0 2px;}

    </style>
</head>
<body>

    <div class="mac-window">
        <!-- 顶栏 -->
        <div class="title-bar">
            <div class="mac-btns">
                <div class="btn close"></div>
                <div class="btn minimize"></div>
                <div class="btn maximize"></div>
            </div>
            <div class="toolbar-icons">
                <span style="opacity: 0.3;">⟲</span>
                <span style="opacity: 0.3;">🗑️</span>
                <span style="opacity: 0.3;">↩️</span>
            </div>
        </div>

        <!-- 主体结构 -->
        <div class="mail-body">
            
            <!-- 1. 左侧边栏 -->
            <div class="sidebar">
                <div class="sidebar-title">个人邮箱</div>
                <div class="nav-item active" data-target="inbox">
                    收件箱 <span class="badge">1</span>
                </div>
                <div class="nav-item" data-target="sent">
                    已发送
                </div>
                <div class="nav-item" style="opacity: 0.5;">草稿箱</div>
                <div class="nav-item" style="opacity: 0.5;">垃圾邮件</div>
            </div>

            <!-- 2. 中间列表区 -->
            <div class="list-pane">
                <div class="list-header" id="list-title">收件箱</div>
                <div id="mail-list-container">
                    <!-- 列表内容由 JS 动态生成 -->
                </div>
            </div>

            <!-- 3. 右侧详情区 -->
            <div class="detail-pane" id="detail-container">
                <!-- 详情内容由 JS 动态生成 -->
            </div>

        </div>
    </div>

    <script>
        // ================= 数据层 =================
        const mailData = {
            inbox: [
                {
                    id: 1,
                    senderName: "黑川龙",
                    senderEmail: "Ryu_Kurokawa_Author@***.com",
                    recipient: "Yuki_Kurokawa@***.com",
                    subject: "给雪的最后一道谜题",
                    date: "2026年6月23日 18:30", // 定时发送时间 (死后72小时)
                    preview: "雪，当你看到这封信时，我已经离开这个世界了。别哭，也别自责...",
                    body: `
                        <p>雪，当你看到这封信时，我已经离开这个世界了。</p>
                        <p>别哭，也别自责。我的死与你的信无关，这是我作为一个枯竭的作家，能写出的最完美的结局。</p>
                        <p>你一直觉得我是个虚伪的怪物。也许你是对的。但我把真正的答案藏在了我们周围人的谎言里。</p>
                        <p><span class="clue-text">用那个你曾经最想撕毁的名字作为初始搜索词。</span></p>
                        <p>自己去寻找真相吧。</p>
                        <p>记住，不要相信你看到的每一张脸，包括你母亲的。</p>
                    `,
                    avatarChar: "R",
                    avatarClass: ""
                }
            ],
            sent: [
                {
                    id: 2,
                    senderName: "黑川雪",
                    senderEmail: "Yuki_Kurokawa@***.com",
                    recipient: "Ryu_Kurokawa_Author@***.com",
                    subject: "无主题",
                    date: "2026年6月19日 23:45", // 案发前一天的深夜
                    preview: "你是个虚伪的怪物。去死吧。",
                    body: `
                        <p>你是个虚伪的怪物。</p>
                        <br>
                        <p>去死吧。</p>
                    `,
                    avatarChar: "Y",
                    avatarClass: "gray" // 发件箱的头像置灰
                }
            ]
        };

        // ================= 视图更新逻辑 =================
        const navItems = document.querySelectorAll('.nav-item[data-target]');
        const listTitle = document.getElementById('list-title');
        const listContainer = document.getElementById('mail-list-container');
        const detailContainer = document.getElementById('detail-container');

        // 渲染邮件列表
        function renderList(type) {
            const mails = mailData[type];
            listTitle.textContent = type === 'inbox' ? '收件箱' : '已发送';
            listContainer.innerHTML = '';

            mails.forEach((mail, index) => {
                const item = document.createElement('div');
                item.className = `mail-item ${index === 0 ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="mail-sender">${mail.senderName} <span class="mail-time">${mail.date.split(' ')[1]}</span></div>
                    <div class="mail-subject">${mail.subject}</div>
                    <div class="mail-preview">${mail.preview}</div>
                `;
                item.onclick = () => renderDetail(mail);
                listContainer.appendChild(item);
            });

            // 默认渲染列表中第一封邮件的详情
            if(mails.length > 0) {
                renderDetail(mails[0]);
            } else {
                detailContainer.innerHTML = '<div style="text-align:center; color:#999; margin-top:50px;">没有选择邮件</div>';
            }
        }

        // 渲染邮件详情
        function renderDetail(mail) {
            detailContainer.innerHTML = `
                <div class="detail-header">
                    <div class="detail-subject">${mail.subject}</div>
                    <div class="detail-date">${mail.date}</div>
                    <div class="detail-info">
                        <div class="avatar ${mail.avatarClass}">${mail.avatarChar}</div>
                        <div>
                            <div class="sender-line">${mail.senderName} <span class="email-address">&lt;${mail.senderEmail}&gt;</span></div>
                            <div class="to-line">发至：${mail.recipient}</div>
                        </div>
                    </div>
                </div>
                <div class="detail-body">
                    ${mail.body}
                </div>
            `;
        }

        // 侧边栏点击切换逻辑
        navItems.forEach(item => {
            item.addEventListener('click', function() {
                navItems.forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');
                renderList(this.getAttribute('data-target'));
            });
        });

        // 页面初始化：加载收件箱
        renderList('inbox');
    </script>
</body>
</html>
