<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光文社 - 数字档案系统 | 文献查看</title>
    <!-- 引入手写字体 (底稿) 和 狂草字体 (假签名) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Liu+Jian+Mao+Cao&family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@300;700&family=Roboto:wght@300;500&display=swap');

        :root {
            --grid-size: 45px;
            --paper-color: #e8dcc4; 
            --line-color: rgba(160, 130, 90, 0.35);
            /* 光文社数字UI主题色 */
            --ui-bg: #111111;
            --ui-panel: #1e1e1e;
            --ui-text-main: #f0f0f0;
            --ui-text-muted: #888888;
            --ui-accent: #c0392b; /* 暗红色点缀 */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--ui-bg);
            display: flex;
            flex-direction: column; /* 改为垂直布局，上方是官网导航 */
            font-family: 'Roboto', 'Noto Serif SC', sans-serif;
            overflow: hidden;
        }

        /* -------------------------------------
           光文社数字档案 UI (外框)
           ------------------------------------- */
        
        /* 顶部导航栏 */
        .archive-header {
            height: 60px;
            background-color: var(--ui-panel);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .archive-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .archive-logo {
            font-family: 'Noto Serif SC', serif;
            font-weight: 700;
            font-size: 22px;
            color: var(--ui-text-main);
            letter-spacing: 2px;
        }

        .archive-tag {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--ui-bg);
            background-color: var(--ui-accent);
            padding: 3px 8px;
            border-radius: 2px;
            font-weight: 500;
        }

        .archive-meta {
            font-size: 13px;
            color: var(--ui-text-muted);
            text-align: right;
            line-height: 1.4;
        }

        .archive-meta span {
            color: var(--ui-text-main);
            margin-left: 5px;
        }

        /* 主体展示区 (容纳原稿纸) */
        .archive-viewer {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            /* 模拟扫描件查看器的暗色渐变底 */
            background: radial-gradient(circle at center, #2a2a2a 0%, #111111 100%);
        }

        /* 扫描件控制栏 (悬浮) */
        .viewer-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            border: 1px solid #444;
            border-radius: 30px;
            padding: 8px 25px;
            display: flex;
            gap: 20px;
            color: var(--ui-text-muted);
            font-size: 14px;
            backdrop-filter: blur(5px);
            z-index: 100;
            pointer-events: none; /* 让鼠标穿透，不影响刮图 */
        }
        
        .control-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-item.active {
            color: var(--ui-accent);
        }

        /* -------------------------------------
           核心：手稿扫描件
           ------------------------------------- */
        .manuscript-paper {
            width: 85vw;
            max-width: 900px;
            height: calc(var(--grid-size) * 14); 
            background-color: var(--paper-color);
            background-image: 
                linear-gradient(var(--line-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--line-color) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            background-position: center 30px; 
            /* 增强纸张边缘阴影，凸显它是一张"被扫描的纸" */
            box-shadow: 0 0 20px rgba(0,0,0,0.8), 20px 20px 60px rgba(0,0,0,0.6), inset 0 0 100px rgba(120, 90, 50, 0.25);
            position: relative;
            padding: 30px 60px 0 60px;
            box-sizing: border-box;
            overflow: hidden; 
            color: #2b2b2b;
            line-height: var(--grid-size);
            font-size: 26px; 
            /* 手稿的专用字体设置 */
            font-family: 'FZShouJinShu-S10S', 'FZShouJinShu', 'HanYiShouJinShuJian', 'Liu Jian Mao Cao', cursive;
        }

        /* 原稿纸内部的水印 */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-20deg);
            font-size: 160px;
            font-family: 'Noto Serif SC', serif;
            font-weight: bold;
            color: rgba(180, 20, 20, 0.05);
            pointer-events: none;
            letter-spacing: 50px;
            white-space: nowrap;
            z-index: 0;
            user-select: none;
        }

        .content {
            position: relative;
            z-index: 1;
            letter-spacing: 3px;
        }

        .title {
            text-align: center;
            font-size: 42px;
            margin: 0;
            height: var(--grid-size);
            letter-spacing: 15px;
        }

        p {
            margin: 0;
            margin-bottom: var(--grid-size);
            text-indent: 2em;
        }

        .scratch-container {
            display: inline-block;
            position: relative;
            vertical-align: top;
            line-height: normal;
        }

        .real-text {
            color: #222;
            padding: 0 5px;
            white-space: nowrap;
        }

        .scratch-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path d="M4 22L20 6L18 4L2 20Z" fill="%23e0e0e0" stroke="%23333" stroke-width="1"/><circle cx="5" cy="19" r="2" fill="%23666"/></svg>') 4 20, auto;
        }

        .signature-block {
            margin-top: calc(var(--grid-size) * 1);
            text-align: right;
            padding-right: 60px;
        }

    </style>
</head>
<body>

    <!-- 光文社数字档案 UI：顶部导航 -->
    <header class="archive-header">
        <div class="archive-brand">
            <div class="archive-logo">KOBUNSHA 光文社</div>
            <div class="archive-tag">Digital Archives</div>
        </div>
        <div class="archive-meta">
            <div>文献编号: <span>#KB-MS-2007-042</span></div>
            <div>归档项目: <span>《暗夜》原始未公开手稿 [高精度扫描版]</span></div>
        </div>
    </header>

    <!-- 光文社数字档案 UI：中央查看器 -->
    <main class="archive-viewer">
        
        <!-- 核心：复古原稿纸 -->
        <div class="manuscript-paper">
            <div class="watermark">光文社</div>
            
            <div class="content">
                <div class="title">疑轨</div>
                <p>第一章</p>
                <p>夜色深沉，如同无法挣脱的泥沼。城市的霓虹在雨水中晕染开来，模糊了善与恶的边界。</p>
                <p>他看着手中冰冷的刀刃，
                    <span class="scratch-container" data-fake="眼神中透着决绝" data-real="双手止不住地颤抖">
                        <span class="real-text">双手止不住地颤抖</span>
                    </span>，知道一切都已经无法回头。
                </p>
                <p>所有的罪恶和真相，都将被彻底掩埋在
                    <span class="scratch-container" data-fake="这无尽的黑暗" data-real="我对他的无尽愧疚">
                        <span class="real-text">我对他的无尽愧疚</span>
                    </span>之中。没有秘密。
                </p>
    
                <div class="signature-block">
                    <span class="scratch-container" data-fake="黑川龙" data-real="伊藤健司">
                        <span class="real-text" style="font-size: 38px;">伊藤健司</span>
                    </span>
                </div>
            </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const containers = document.querySelectorAll('.scratch-container');

            containers.forEach(container => {
                const fakeText = container.getAttribute('data-fake');
                const realTextSpan = container.querySelector('.real-text');
                
                setTimeout(() => {
                    const rect = realTextSpan.getBoundingClientRect();
                    const paddingX = 25; 
                    const paddingY = 15; 
                    
                    const canvas = document.createElement('canvas');
                    canvas.className = 'scratch-canvas';
                    canvas.width = rect.width + paddingX * 2;
                    canvas.height = rect.height + paddingY * 2;
                    
                    container.appendChild(canvas);
                    const ctx = canvas.getContext('2d');

                    // 画涂改液底色
                    ctx.fillStyle = '#fdfdfc'; 
                    ctx.beginPath();
                    ctx.roundRect(8, 8, canvas.width - 16, canvas.height - 16, 6);
                    ctx.fill();

                    // 绘制假笔迹（黑川龙：狂草字体）
                    ctx.fillStyle = '#111';
                    ctx.font = 'bold 30px "Zhi Mang Xing", cursive'; 
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.save();
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.rotate(-0.06); 
                    ctx.fillText(fakeText, 0, 0);
                    ctx.restore();

                    // 刮刮乐事件监听
                    let isDrawing = false;

                    function getMousePos(canvas, e) {
                        const rect = canvas.getBoundingClientRect();
                        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                        return {
                            x: clientX - rect.left,
                            y: clientY - rect.top
                        };
                    }

                    function scratch(e) {
                        if (!isDrawing) return;
                        e.preventDefault(); 
                        const pos = getMousePos(canvas, e);
                        
                        ctx.globalCompositeOperation = 'destination-out';
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, 14, 0, Math.PI * 2); 
                        ctx.fill();
                    }

                    canvas.addEventListener('mousedown', (e) => { isDrawing = true; scratch(e); });
                    canvas.addEventListener('mousemove', scratch);
                    window.addEventListener('mouseup', () => { isDrawing = false; });
                    canvas.addEventListener('mouseleave', () => { isDrawing = false; });

                    canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); }, {passive: false});
                    canvas.addEventListener('touchmove', scratch, {passive: false});
                    window.addEventListener('touchend', () => { isDrawing = false; });

                }, 500); 
            });
        });
    </script>
</body>
</html>
