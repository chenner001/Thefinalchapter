<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理系统 - 黑百合花艺</title>
    <style>
        /* ================= 基础重置与后台极简风格 ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #f5f5f5;
            color: #222;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            user-select: none;
        }

        /* ================= 侧边导航栏 ================= */
        .sidebar {
            width: 240px;
            background-color: #111;
            color: #aaa;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #000;
        }
        .sys-logo {
            padding: 20px;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 2px;
            border-bottom: 1px solid #222;
            font-family: monospace;
        }
        .nav-list {
            list-style: none;
            padding: 20px 0;
        }
        .nav-item {
            padding: 12px 20px;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }
        .nav-item:hover { background-color: #222; color: #fff; }
        .nav-item.active { background-color: #2a2a2a; color: #fff; border-left: 3px solid #d4af37; }

        /* ================= 中间：订单列表 ================= */
        .list-pane {
            width: 320px;
            background-color: #fff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }
        .pane-header {
            padding: 15px 20px;
            border-bottom: 1px solid #ddd;
            background: #fafafa;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .order-list {
            flex: 1;
            overflow-y: auto;
        }
        .order-item {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }
        .order-item:hover { background: #f9f9f9; }
        .order-item.active { background: #f0f7ff; border-left: 3px solid #0066cc; }
        
        .order-date { font-family: monospace; font-size: 12px; color: #666; margin-bottom: 4px; }
        .order-customer { font-size: 14px; font-weight: 600; color: #111; display: flex; justify-content: space-between; }
        .order-status { font-size: 12px; color: #008000; }
        .order-status.pending { color: #cc0000; font-weight: bold; }

        /* ================= 右侧：订单详情 ================= */
        .detail-pane {
            flex: 1;
            background-color: #fff;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }
        .detail-header {
            border-bottom: 2px solid #111;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .order-id { font-family: monospace; font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .order-meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 14px;
            color: #444;
        }
        .meta-label { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .meta-value { font-weight: 600; color: #111; }
        
        /* 核心信息：加密留言框 */
        .private-note-section {
            margin-top: 40px;
            background: #fffcf5;
            border: 1px solid #e8dfc8;
            padding: 25px;
            border-radius: 4px;
        }
        .note-title {
            font-size: 12px;
            color: #b38b22;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .note-title::before { content: '🔒'; margin-right: 8px; }
        
        .note-content {
            font-family: "Noto Serif SC", serif;
            font-size: 16px;
            line-height: 1.8;
            color: #333;
            text-align: justify;
        }

        /* 重点高亮：一家三口 */
        .fatal-clue {
            color: #cc0000;
            font-weight: bold;
            background: rgba(204, 0, 0, 0.1);
            padding: 0 4px;
        }

        /* 附件下载按钮 */
        .attachment-btn {
            display: inline-flex;
            align-items: center;
            margin-top: 25px;
            padding: 10px 20px;
            background: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
        }
        .attachment-btn:hover { background: #e0e0e0; border-color: #999; }
        .attachment-btn::before { content: '📄'; margin-right: 8px; font-size: 16px; }

        /* ================= 恐怖的系统劫持特效 (Override) ================= */
        .override-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .override-overlay.active {
            opacity: 1;
            pointer-events: auto;
            animation: glitch-screen 0.3s forwards;
        }

        .incoming-text {
            color: #ff3333;
            font-family: monospace;
            font-size: 24px;
            letter-spacing: 10px;
            animation: text-flash 0.5s infinite;
        }

        @keyframes glitch-screen {
            0% { opacity: 0; filter: invert(0); }
            20% { opacity: 1; filter: invert(1); transform: translate(5px, -5px); }
            40% { filter: invert(0); transform: translate(-5px, 5px); }
            60% { filter: invert(1); transform: translate(5px, 5px); }
            100% { opacity: 1; filter: invert(0); transform: translate(0, 0); }
        }
        @keyframes text-flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

    </style>
</head>
<body>

    <!-- 左侧导航 -->
    <div class="sidebar">
        <div class="sys-logo">BL-FLORAL // DB_ADMIN</div>
        <ul class="nav-list">
            <li class="nav-item">仪表盘 Dashboard</li>
            <li class="nav-item active">订单管理 Orders</li>
            <li class="nav-item">客户档案 VIP Database</li>
            <li class="nav-item">财务报表 Financials</li>
            <li class="nav-item">系统设置 Settings</li>
        </ul>
    </div>

    <!-- 中间订单列表 -->
    <div class="list-pane">
        <div class="pane-header">
            <span>筛选: 客户[VIP-I.K.]</span>
            <span style="font-weight: normal; color: #888;">共 228 条</span>
        </div>
        <div class="order-list" id="orderList">
            <!-- JS 动态渲染 -->
        </div>
    </div>

    <!-- 右侧订单详情 -->
    <div class="detail-pane" id="detailPane">
        <div style="color: #999; text-align: center; margin-top: 200px;">请在左侧选择订单查看详情。</div>
    </div>

    <!-- 系统劫持遮罩 -->
    <div class="override-overlay" id="overrideScreen">
        <div class="incoming-text">SYSTEM INTRUSION // REMOTE LOGIN...</div>
    </div>

    <script>
        // ================= 数据库内容模拟 =================
        const ordersData = [
            {
                id: "ORD-20260618-992",
                date: "2026-06-18 21:14:05", // 案发前夜
                customer: "VIP-I.K.",
                realName: "伊藤 健司 (Ito Kenji)",
                recipient: "店长本人 (百合)",
                item: "黑百合私密定制 (最高规格)",
                status: "待处理",
                isPending: true,
                note: "枯木终于要被砍断了。一切准备就绪，发布会之后，我们<span class='fatal-clue'>一家三口</span>离开这个地狱。",
                attachment: "附件：行前体检与移民材料.pdf"
            },
            {
                id: "ORD-20161221-415",
                date: "2016-12-21 14:30:22",
                customer: "VIP-I.K.",
                realName: "伊藤 健司 (Ito Kenji)",
                recipient: "店长本人 (百合)",
                item: "黑百合私密定制",
                status: "已完成",
                isPending: false,
                note: "九年了。他到底什么时候死？我快疯了。今天雪九岁生日，我只能以‘叔叔’的身份送她礼物，这种日子我受够了。",
                attachment: null
            },
            {
                id: "ORD-20071221-001",
                date: "2007-12-21 09:15:40",
                customer: "VIP-I.K.",
                realName: "伊藤 健司 (Ito Kenji)",
                recipient: "店长本人 (百合)",
                item: "黑百合私密定制",
                status: "已完成",
                isPending: false,
                note: "百合，我们的雪降生了。忍耐一下，等那个废人死了，我们就光明正大地在一起。",
                attachment: null
            },
            {
                id: "ORD-20070311-042",
                date: "2007-03-11 09:15:40",
                customer: "VIP-I.K.",
                realName: "伊藤 健司 (Ito Kenji)",
                recipient: "店长本人 (百合)",
                item: "黑百合私密定制",
                status: "已完成",
                isPending: false,
                note: "他又去酒店了。这次又是安奈那个女人陪着，在套房里一待就是整整一天。他对外说是‘累了需要静养’，呵，百合，你看他多固执。他为了维持那最后一点虚伪的尊严，宁愿把时间都浪费在一个外人身上，也不肯让你靠近他半步——大概是怕你看到他中风后口歪眼斜、连尿都控制不住的丑态吧。",
                attachment: null
            }
        ];

        // ================= 渲染逻辑 =================
        const orderListEl = document.getElementById('orderList');
        const detailPaneEl = document.getElementById('detailPane');

        function renderList() {
            ordersData.forEach((order, index) => {
                const div = document.createElement('div');
                div.className = 'order-item';
                div.onclick = () => selectOrder(index, div);
                
                div.innerHTML = `
                    <div class="order-date">${order.date}</div>
                    <div class="order-customer">
                        <span>${order.customer}</span>
                        <span class="order-status ${order.isPending ? 'pending' : ''}">${order.status}</span>
                    </div>
                `;
                orderListEl.appendChild(div);
            });
        }

        function selectOrder(index, element) {
            // 更新列表选中状态
            document.querySelectorAll('.order-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            const order = ordersData[index];
            
            // 附件按钮的 HTML (仅第一条最新订单有)
            let attachmentHtml = '';
            if (order.attachment) {
                attachmentHtml = `<div class="attachment-btn" onclick="triggerOverride()">${order.attachment}</div>`;
            }

            detailPaneEl.innerHTML = `
                <div class="detail-header">
                    <div class="order-id">${order.id}</div>
                    <div class="order-meta-grid">
                        <div>
                            <div class="meta-label">下单时间</div>
                            <div class="meta-value">${order.date}</div>
                        </div>
                        <div>
                            <div class="meta-label">客户账号 (真实身份核验)</div>
                            <div class="meta-value" style="color:#cc0000;">${order.customer} / ${order.realName}</div>
                        </div>
                        <div>
                            <div class="meta-label">收件人</div>
                            <div class="meta-value">${order.recipient}</div>
                        </div>
                        <div>
                            <div class="meta-label">商品明细</div>
                            <div class="meta-value">${order.item}</div>
                        </div>
                    </div>
                </div>

                <div class="private-note-section">
                    <div class="note-title">端到端加密私人留言 [已解密]</div>
                    <div class="note-content">“${order.note}”</div>
                    ${attachmentHtml}
                </div>
            `;
        }

        // ================= 致命交互：触发劫持 =================
        function triggerOverride() {
            // 触发黑屏与红字警告
            const overrideScreen = document.getElementById('overrideScreen');
            overrideScreen.classList.add('active');

            // 1.5秒后强制跳转至下一关（妈妈的电话）
            setTimeout(() => {
                window.location.href = 'mom_call.html';
            }, 1500);
        }

        // 初始化
        window.onload = renderList;
    </script>
</body>
</html>
