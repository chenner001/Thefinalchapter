<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuki's Mac - Desktop</title>
    <style>
        /* ================= 基础重置与桌面背景 ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html {
            width: 100%; height: 100%;
            background: url('桌面.png') no-repeat center center fixed;
            background-size: cover;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ================= 顶部菜单栏 (macOS 亮色) ================= */
        .menu-bar {
            height: 28px;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 13px;
            font-weight: 500;
            color: #000;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .menu-left, .menu-right { display: flex; gap: 15px; align-items: center; }
        .apple-logo { font-size: 15px; }

        /* ================= 底部 Dock 栏 ================= */
        .dock-container {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 8px 12px;
            border-radius: 20px;
            display: flex;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        .dock-icon {
            width: 50px;
            height: 50px;
            background-color: #fff;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), margin-bottom 0.2s;
            position: relative;
        }
        .dock-icon:hover {
            transform: scale(1.2) translateY(-10px);
            margin-bottom: 10px;
        }
        .dock-icon::after {
            content: '';
            position: absolute;
            bottom: -6px;
            width: 4px;
            height: 4px;
            background-color: rgba(0,0,0,0.4);
            border-radius: 50%;
            display: none;
        }
        .dock-icon.active::after { display: block; }

        /* ================= macOS 弹窗 (相册应用) ================= */
        .mac-window {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 900px;
            height: 75vh;
            background-color: #f5f5f7;
            border-radius: 10px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4), 0 0 1px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 100;
        }
        
        .title-bar {
            height: 52px;
            background-color: #e8e8ed;
            border-bottom: 1px solid #d1d1d6;
            display: flex;
            align-items: center;
            padding: 0 15px;
            justify-content: space-between;
        }
        .traffic-lights { display: flex; gap: 8px; width: 60px; }
        .traffic-lights span { width: 12px; height: 12px; border-radius: 50%; display: inline-block; cursor: pointer; }
        .close { background-color: #ff5f56; border: 1px solid #e0443e; }
        .minimize { background-color: #ffbd2e; border: 1px solid #dea123; }
        .maximize { background-color: #27c93f; border: 1px solid #1aab29; }
        .window-title { font-size: 14px; font-weight: 600; color: #1d1d1f; }
        .title-placeholder { width: 60px; }

        /* ================= 相册内容区 ================= */
        .content-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #e5e5ea;
        }

        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        .slide.active { display: flex; }
        
        .flip-container {
            perspective: 1500px;
            width: 100%;
            height: 100%;
            max-width: 700px;
            max-height: 500px;
            cursor: pointer;
        }
        .flipper {
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
            width: 100%;
            height: 100%;
        }
        .flip-container.flipped .flipper {
            transform: rotateY(180deg);
        }
        .front, .back {
            backface-visibility: hidden;
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            object-fit: contain;
            background-color: #fff;
        }
        .back {
            transform: rotateY(180deg);
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid #ccc;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: #333;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
        }
        .nav-btn:hover { background-color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        /* ================= 加密相册页 ================= */
        .locked-album {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .lock-icon { font-size: 48px; margin-bottom: 20px; }
        .hint-text {
            font-family: monospace;
            font-size: 15px;
            color: #555;
            margin-bottom: 30px;
            background: #f4f4f5;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.8;
            border: 1px dashed #ccc;
        }
        .hint-text span { margin: 0 10px; font-weight: bold; }
        .pwd-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            margin-bottom: 15px;
            text-align: center;
        }
        .pwd-input:focus { border-color: #007aff; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2); }
        .unlock-btn {
            background-color: #007aff;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 12px 30px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        .unlock-btn:hover { background-color: #0062cc; }

        .err-msg {
            display: none;
            margin-top: 15px;
            color: #ff3b30;
            font-size: 13px;
            font-weight: bold;
        }

        .success-view {
            display: none;
            flex-direction: column;
            align-items: center;
            color: #34c759;
            font-weight: bold;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
    </style>
</head>
<body>

    <div class="menu-bar">
        <div class="menu-left">
            <span class="apple-logo"></span>
            <span style="font-weight: 700;">Finder</span>
            <span>文件</span>
            <span>编辑</span>
            <span>显示</span>
            <span>前往</span>
            <span>窗口</span>
            <span>帮助</span>
        </div>
        <div class="menu-right">
            <span>100%</span>
            <span>周六 22:27</span>
        </div>
    </div>

    <div class="mac-window" id="photos-app">
        <div class="title-bar">
            <div class="traffic-lights">
                <span class="close" onclick="closePhotos()"></span>
                <span class="minimize"></span>
                <span class="maximize"></span>
            </div>
            <div class="window-title">照片</div>
            <div class="title-placeholder"></div>
        </div>
        
        <div class="content-area">
            <div class="nav-btn prev-btn" id="prevBtn" onclick="changeSlide(-1)">❮</div>
            <div class="nav-btn next-btn" id="nextBtn" onclick="changeSlide(1)">❯</div>

            <div class="slide active">
                <div class="flip-container" onclick="this.classList.toggle('flipped')">
                    <div class="flipper">
                        <img src="父亲的获奖晚宴2012.0915.png" class="front" alt="Front">
                        <img src="4.png" class="back" alt="Back">
                    </div>
                </div>
            </div>

            <div class="slide">
                <div class="flip-container" onclick="this.classList.toggle('flipped')">
                    <div class="flipper">
                        <img src="雪7岁生日2014.1221.png" class="front" alt="Front">
                        <img src="2.png" class="back" alt="Back">
                    </div>
                </div>
            </div>

            <div class="slide">
                <div class="flip-container" onclick="this.classList.toggle('flipped')">
                    <div class="flipper">
                        <img src="雪18岁生日2025.1221.png" class="front" alt="Front">
                        <img src="1.png" class="back" alt="Back">
                    </div>
                </div>
            </div>

            <div class="slide">
                <div class="flip-container" onclick="this.classList.toggle('flipped')">
                    <div class="flipper">
                        <img src="黑川葵2013.png" class="front" alt="Front">
                        <img src="3.png" class="back" alt="Back">
                    </div>
                </div>
            </div>

            <div class="slide">
                <div class="locked-album" id="locked-view">
                    <div class="lock-icon">🔐</div>
                    <div style="font-weight: bold; margin-bottom: 20px; font-size: 18px;">已隐藏的相册</div>
                    
                    <div class="hint-text">
                        <div><span>线索1</span><span>线索2</span><span>线索3</span><span>宝藏</span></div>
                        <div style="color: #007aff; margin-top: 5px;"><span>●</span><span>●</span><span>&gt;</span><span>&gt;</span></div>
                    </div>
                    
                    <input type="text" id="album-pwd" class="pwd-input" placeholder="输入密码以解锁" autocomplete="off">
                    <button class="unlock-btn" onclick="executeUnlock()">解锁</button>
                    
                    <div class="err-msg" id="pwd-err"></div>
                </div>

                <div class="locked-album success-view" id="success-view">
                    <div style="font-size: 48px; margin-bottom: 20px;">🔓</div>
                    <div style="font-size: 18px;">【系统解密成功】</div>
                    <div style="color: #555; margin-top: 10px; font-weight: normal; font-size: 14px;">
                        已获取底层数据权限，正在建立安全连接...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="dock-container">
        <div class="dock-icon active" onclick="openPhotos()" title="照片">🖼️</div>
        <div class="dock-icon" onclick="launchApp('app_01')" title="邮件">✉️</div>
        <div class="dock-icon" onclick="launchApp('app_02')" title="Safari浏览器">🧭</div>
    </div>

<script>
        // ================== 相册轮播逻辑 ==================
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function updateSlider() {
            slides.forEach((slide, index) => {
                slide.classList.remove('active');
                if (index === currentSlide) slide.classList.add('active');
            });
            prevBtn.style.display = currentSlide === 0 ? 'none' : 'flex';
            nextBtn.style.display = currentSlide === slides.length - 1 ? 'none' : 'flex';
            document.querySelectorAll('.flip-container').forEach(card => card.classList.remove('flipped'));
            document.getElementById('pwd-err').style.display = 'none';
            document.getElementById('album-pwd').value = '';
        }

        function changeSlide(direction) {
            currentSlide += direction;
            updateSlider();
        }

        function openPhotos() {
            document.getElementById('photos-app').style.display = 'flex';
            currentSlide = 0;
            updateSlider();
        }

        function closePhotos() {
            document.getElementById('photos-app').style.display = 'none';
        }

        // ================== 核心解密内核 ==================
        function _0xDecryptEngine(obfuscatedStr) {
            var shift = 5; 
            var result = "";
            for (var i = 0; i < obfuscatedStr.length; i++) {
                result += String.fromCharCode(obfuscatedStr.charCodeAt(i) - shift);
            }
            return result;
        }

        function launchApp(appId) {
            var apps = {
                'app_01': 'jrfnq3myrq', // -> email.html
                'app_02': 'xjawhm3myrq' // -> search.html
            };
            if (apps[appId]) {
                window.open(_0xDecryptEngine(apps[appId]), '_blank');
            }
        }

        // ================== 高维指纹密码校验器 (已修复) ==================
        function executeUnlock() {
            var input = document.getElementById('album-pwd').value.trim().toLowerCase();
            var errMsg = document.getElementById('pwd-err');

            var signature = 0;
            for (var j = 0; j < input.length; j++) {
                signature += (input.charCodeAt(j) * (j + 1));
            }

            // 
            if (input.length === 9 && signature === 4960) {
                document.getElementById('locked-view').style.display = 'none';
                document.getElementById('success-view').style.display = 'flex';
                
                setTimeout(function() {
                    window.open(_0xDecryptEngine('umtyt3myrq'), '_blank');
                }, 800);
            } else {
                errMsg.innerText = "❌ 警告：密钥不匹配，系统已锁定。";
                errMsg.style.display = 'block';
                errMsg.style.animation = 'none';
                void errMsg.offsetWidth; 
                errMsg.style.animation = 'shake 0.4s ease';
            }
        }

        window.onload = function() {
            var pwdBox = document.getElementById('album-pwd');
            if (pwdBox) {
                pwdBox.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') executeUnlock();
                });
                pwdBox.addEventListener('input', function() {
                    document.getElementById('pwd-err').style.display = 'none';
                });
            }
            updateSlider();
        };
    </script>
</body>
</html>
